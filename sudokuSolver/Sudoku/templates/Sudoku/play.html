<script>
    // Global variables
    let gameBoard = [...Array(9)].map(() => Array(9).fill(null));
    let solutionBoard = [];
    let selectedCell = null;
    
    document.addEventListener('DOMContentLoaded', () => {
        console.log("DOM Content Loaded");
        
        // Check session storage
        const puzzleData = sessionStorage.getItem('sudokuPuzzle');
        console.log('Retrieved puzzle data:', puzzleData);
        
        // Initialize game state
        gameBoard = [...Array(9)].map(() => Array(9).fill(null));
        solutionBoard = [];
        selectedCell = null;
    
        // Initialize the grid
        initializeGrid();
        initializeNumberButtons();
        
        if (puzzleData) {
            try {
                const data = JSON.parse(puzzleData);
                console.log('Parsed puzzle data:', data);
                if (data.puzzle && data.solution) {
                    gameBoard = data.puzzle;
                    solutionBoard = data.solution;
                    renderBoard(gameBoard);
                } else {
                    console.error('Invalid puzzle data structure');
                }
            } catch (error) {
                console.error('Error parsing puzzle data:', error);
            }
        } else {
            console.log('No puzzle data found in session storage');
            // Fetch new puzzle if no data in session storage
            fetchSudoku(30); // Default to medium difficulty
        }
    });
    
    function renderBoard(board) {
        console.log('Rendering board:', board);
        
        const grid = document.querySelector('.sudoku-grid'); 
        grid.innerHTML = '';  // Clear any previous cells
    
        for (let row = 0; row < 9; row++) {
            for (let col = 0; col < 9; col++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-row', row);
                cell.setAttribute('data-col', col);
                cell.setAttribute('tabindex', '0');
    
                if (board[row][col] !== 0 && board[row][col] !== null) {
                    cell.textContent = board[row][col];
                    cell.classList.add('initial-number');
                } else {
                    cell.addEventListener('click', () => selectCell(cell));
                }
    
                grid.appendChild(cell);
            }
        }
    }
    
    function selectCell(cell) {
        console.log('Cell selected:', cell);
    
        // Remove previous selection
        if (selectedCell) {
            selectedCell.classList.remove('selected');
        }
    
        selectedCell = cell;
        cell.classList.add('selected');
    
        // Highlight related cells
        highlightRelatedCells(cell);
    }
    
    
    function enterNumber(num) {
        if (!selectedCell) {
            console.log('No cell selected');
            return;
        }
    
        const row = parseInt(selectedCell.getAttribute('data-row'));
        const col = parseInt(selectedCell.getAttribute('data-col'));
    
        // Check if row or col is out of bounds
        if (row < 0 || row > 8 || col < 0 || col > 8) {
            console.error("Invalid row or column:", row, col);
            return;
        }
    
        if (!solutionBoard[row] || solutionBoard[row][col] === undefined) {
            console.error(`Invalid board access at [${row}][${col}]`);
            return;
        }
    
        if (gameBoard[row][col] !== 0 && gameBoard[row][col] !== null) {
            console.log('Cannot modify initial number');
            return;
        }
    
        if (solutionBoard[row][col] === num) {
            selectedCell.textContent = num;
            gameBoard[row][col] = num;
            selectedCell.classList.add('correct-number');
            selectedCell.style.animation = 'numberEnter 0.3s ease';
    
            setTimeout(() => { selectedCell.style.animation = ''; }, 300);
    
            if (isPuzzleComplete()) {
                handlePuzzleCompletion();
            }
        } else {
            selectedCell.style.animation = 'invalidMove 0.3s ease';
            setTimeout(() => { selectedCell.style.animation = ''; }, 300);
        }
    }
    
    
    function initializeGrid() {
        console.log('Initializing grid');
        

        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, index) => {
            cell.setAttribute('tabindex', '0');
            cell.addEventListener('click', () => {
                console.log(`Cell clicked: ${index}`);
                selectCell(cell);
            });
        });
        
    }
    
    // Helper function to get CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
    function initializeNumberButtons() {
        console.log('Initializing number buttons');
        for (let i = 1; i <= 9; i++) {
            const button = document.querySelector(`.rectangle${i}`);
            if (button) {
                button.addEventListener('click', () => {
                    console.log(`Number button clicked: ${i}`);
                    enterNumber(i);
                });
            } else {
                console.error(`Button not found: .rectangle${i}`);
            }
        }
    }
    
    function fetchSudoku(clues) {
        console.log('Fetching sudoku with clues:', clues);
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        
        fetch('/sudokuGenerate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify({ clues: clues })
        })
        .then(response => {
            console.log('Received response:', response);
            return response.json();
        })
        .then(data => {
            console.log('Received data:', data);
            if (data.puzzle && data.solution) {
                gameBoard = data.puzzle;
                solutionBoard = data.solution;
                renderBoard(gameBoard);
            }
        })
        .catch(error => {
            console.error('Error fetching sudoku:', error);
        });
    }
    
    function highlightRelatedCells(cell) {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(c => c.classList.remove('highlighted'));
        
        const index = [...cell.parentNode.children].indexOf(cell);
        const row = Math.floor(index / 9);
        const col = index % 9;
        const boxStartRow = Math.floor(row / 3) * 3;
        const boxStartCol = Math.floor(col / 3) * 3;
        
        cells.forEach((c, i) => {
            const currentRow = Math.floor(i / 9);
            const currentCol = i % 9;
            
            if (currentRow === row || currentCol === col || 
                (currentRow >= boxStartRow && currentRow < boxStartRow + 3 &&
                 currentCol >= boxStartCol && currentCol < boxStartCol + 3)) {
                c.classList.add('highlighted');
            }
        });
    }
    
    function isPuzzleComplete() {
        for (let row = 0; row < 9; row++) {
            for (let col = 0; col < 9; col++) {
                if (gameBoard[row][col] !== solutionBoard[row][col]) {
                    return false;
                }
            }
        }
        return true;
    }
    
    function handlePuzzleCompletion() {
        // Calculate score based on time
        const timeSpent = document.getElementById('timer_val').textContent;
        const score = calculateScore(timeSpent);
        
        // Update score display
        document.getElementById('score_val').textContent = score;
        
        // Show completion message
        alert(`Congratulations! You completed the puzzle!\nScore: ${score}`);
    }
    
    function calculateScore(timeSpent) {
        // Convert time to seconds
        const [minutes, seconds] = timeSpent.split(':').map(Number);
        const totalSeconds = minutes * 60 + seconds;
        
        // Base score calculation
        let score = Math.max(1000 - totalSeconds, 0);
        
        return Math.round(score);
    }
    
    // Keep user profile JavaScript if it exists
    const userProfile = document.getElementById('userProfile');
    if (userProfile) {
        userProfile.classList.add('authenticated');
        
        userProfile.addEventListener('click', (event) => {
            event.stopPropagation();
            userProfile.classList.toggle('expanded');
        });
    
        document.addEventListener('click', (event) => {
            if (!userProfile.contains(event.target)) {
                userProfile.classList.remove('expanded');
            }
        });
    }
    
    // Keep sidebar JavaScript
    const hamburger = document.getElementById('ham');
    const sidebar = document.getElementById('sidebar');
    
    hamburger.addEventListener('click', () => {
        sidebar.classList.toggle('active');
    });
    
    document.addEventListener('click', (event) => {
        const isClickInside = sidebar.contains(event.target) || hamburger.contains(event.target);
        if (!isClickInside) {
            sidebar.classList.remove('active');
        }
    });

    // ✅ Event listener for number buttons
document.addEventListener("DOMContentLoaded", () => {
    for (let i = 1; i <= 9; i++) {
        document.querySelector(`.rectangle${i}`)?.addEventListener("click", () => enterNumber(i));
    }
});
    </script>
